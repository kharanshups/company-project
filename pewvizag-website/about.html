    <style>
        .placeholder-page {
            min-height: 100vh;

            font-weight: 600;

            letter-spacing: 0.05em;
            transition: background 0.3s;
        }

        .placeholder-page .back-btn:hover {
            background: var(--red);
        }

        .placeholder-icon {

            margin-bottom: 20px;

        .coming-badge {

            background: var(--red);
